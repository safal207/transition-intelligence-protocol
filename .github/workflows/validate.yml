name: Validate protocol family

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate records and validators
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate canonical TIP examples
        run: python -m tip validate examples/json/

      - name: Validate canonical IFP examples
        run: python -m tip validate-ifp examples/ifp/

      - name: Validate canonical IFP-to-TIP handoff
        run: >-
          python -m tip validate-handoff
          examples/json/protocol-family-next-step.tip.json
          examples/ifp/project-initialization.ifp.json

      - name: Test protocol validators
        run: python -m unittest discover -s tests -v
