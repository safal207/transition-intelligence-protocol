name: Validate TIP protocol

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate records and validator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate canonical TIP examples
        run: python -m tip validate examples/json/

      - name: Test the validator
        run: python -m unittest discover -s tests -v
